<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>P-Finder | 智能停車推薦系統</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.css" />
    
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-100">

    <div id="nav-header" class="fixed top-0 left-0 right-0 z-[3000] bg-blue-700 text-white p-5 shadow-2xl flex-col gap-2">
        <div class="flex items-center gap-4">
            <div class="w-12 h-12 flex items-center justify-center bg-white/20 rounded-xl border border-white/30">
                <span id="nav-arrow" class="text-3xl font-bold">↑</span>
            </div>
            <div class="flex-1">
                <p id="nav-instruction" class="text-lg font-bold leading-tight">計算路徑中...</p>
                <p id="nav-metrics" class="text-xs opacity-80 font-mono tracking-widest">0.0 km | 0 min</p>
            </div>
            <button onclick="stopNavigation()" class="bg-red-500 px-4 py-2 rounded-lg font-bold shadow-lg transition active:scale-95">結束</button>
        </div>
    </div>

    <div class="sidebar flex flex-col z-[1001]">
        <div class="p-5 border-b bg-white sticky top-0 z-20">
            <div class="flex justify-between items-center mb-4">
                <h1 class="text-2xl font-black text-blue-600 italic tracking-tighter">P-Finder</h1>
                <div id="gps-status" class="flex items-center gap-2 text-[10px] font-bold text-slate-400">
                    GPS <div id="gps-dot" class="w-2 h-2 bg-red-500 rounded-full"></div>
                </div>
            </div>
            <div class="flex gap-2">
                <input type="text" id="searchInput" oninput="handleFilter()" placeholder="輸入關鍵字或搜尋附近..." 
                       class="flex-1 p-3 bg-slate-100 rounded-xl border-none text-sm outline-none focus:ring-2 focus:ring-blue-400">
                <button onclick="locateUser()" class="bg-white border px-3 rounded-xl shadow-sm active:bg-slate-50">📍</button>
            </div>
        </div>

        <div class="flex border-b text-center text-xs font-bold text-slate-400 bg-white">
            <button onclick="switchTab('search')" id="tab-search" class="flex-1 py-4 active-tab">推薦停車</button>
            <button onclick="switchTab('fav')" id="tab-fav" class="flex-1 py-4">我的收藏</button>
        </div>

        <div id="content-list" class="flex-1 overflow-y-auto p-4 space-y-3 bg-slate-50 no-scrollbar">
            </div>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.js"></script>
    
    <script src="script.js"></script>
</body>
</html>
